<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathan a 3 ans ! - Super Mario</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    margin: 0;
    font-family: 'Fredoka', sans-serif;
    overflow: hidden;
    background: #2196F3;
  }

  .poster {
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #64B5F6 0%, #2196F3 30%, #1565C0 70%, #0D47A1 100%);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes floatCloud {
    0% { transform: translateX(0); }
    100% { transform: translateX(-120vw); }
  }
  @keyframes twinkle {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.6; }
  }
  @keyframes spinCoin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes marioJump {
    0%, 100% { transform: translateY(0) scaleX(1); }
    20% { transform: translateY(-15px) scaleX(1); }
    40% { transform: translateY(-25px) scaleX(1); }
    60% { transform: translateY(-15px) scaleX(1); }
  }
  @keyframes koopaWalk {
    0%, 100% { transform: translateX(0) scaleX(-1); }
    25% { transform: translateX(-8px) scaleX(-1) rotate(-3deg); }
    75% { transform: translateX(8px) scaleX(-1) rotate(3deg); }
  }
  @keyframes mushroomBob {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.05); }
  }
  @keyframes questionPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); box-shadow: inset 2px 2px 0 rgba(255,255,255,0.4), inset -2px -2px 0 rgba(0,0,0,0.2), 2px 2px 0 rgba(0,0,0,0.3), 0 0 15px rgba(255,214,0,0.6); }
  }
  @keyframes slideUp {
    0% { transform: translateY(30px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes rainbowScroll {
    0% { background-position: 0 0; }
    100% { background-position: 200px 0; }
  }
  @keyframes confetti {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0.3; }
  }
  @keyframes badgePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  /* Clouds - animated */
  .clouds {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 15vh;
    z-index: 1;
  }
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud1 { width: 10vw; height: 3vh; top: 2vh; left: 105vw; animation: floatCloud 25s linear infinite; }
  .cloud1::before { width: 4vw; height: 4vh; top: -2.5vh; left: 1.5vw; }
  .cloud1::after { width: 6vw; height: 5vh; top: -3vh; left: 3vw; }

  .cloud2 { width: 12vw; height: 3.5vh; top: 5vh; left: 105vw; animation: floatCloud 35s linear infinite; animation-delay: -10s; }
  .cloud2::before { width: 5vw; height: 4.5vh; top: -2.8vh; left: 2vw; }
  .cloud2::after { width: 7vw; height: 5vh; top: -3.5vh; left: 4vw; }

  .cloud3 { width: 8vw; height: 2.5vh; top: 9vh; left: 105vw; animation: floatCloud 30s linear infinite; animation-delay: -20s; }
  .cloud3::before { width: 3.5vw; height: 3.5vh; top: -2vh; left: 1vw; }
  .cloud3::after { width: 5vw; height: 4vh; top: -2.5vh; left: 3vw; }

  .cloud4 { width: 10vw; height: 3vh; top: 1.5vh; left: 105vw; animation: floatCloud 28s linear infinite; animation-delay: -5s; }
  .cloud4::before { width: 4.5vw; height: 4vh; top: -2.5vh; left: 1.5vw; }
  .cloud4::after { width: 6vw; height: 4.5vh; top: -3vh; left: 4vw; }

  .cloud5 { width: 9vw; height: 2.8vh; top: 7vh; left: 105vw; animation: floatCloud 32s linear infinite; animation-delay: -15s; }
  .cloud5::before { width: 4vw; height: 3.8vh; top: -2.2vh; left: 1.2vw; }
  .cloud5::after { width: 5.5vw; height: 4.2vh; top: -2.8vh; left: 3.5vw; }

  /* Question blocks - animated */
  .question-block {
    width: 4vw; height: 4vw;
    max-width: 45px; max-height: 45px;
    background: linear-gradient(135deg, #FFD54F, #FF8F00);
    border: 3px solid #5D4037;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bangers', cursive;
    font-size: clamp(12px, 2vw, 20px);
    color: #5D4037;
    position: absolute;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.4), inset -2px -2px 0 rgba(0,0,0,0.2), 2px 2px 0 rgba(0,0,0,0.3);
    animation: questionPulse 2s ease-in-out infinite;
  }
  .qb1 { top: 12vh; left: 3%; animation-delay: 0s; }
  .qb2 { top: 14vh; right: 4%; animation-delay: 0.5s; }
  .qb3 { top: 42vh; left: 2%; animation-delay: 1s; }
  .qb4 { top: 44vh; right: 3%; animation-delay: 1.5s; }

  /* Bricks */
  .brick {
    width: 4vw; height: 4vw;
    max-width: 45px; max-height: 45px;
    background: linear-gradient(135deg, #A1887F, #795548);
    border: 2px solid #4E342E;
    border-radius: 3px;
    position: absolute;
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.2), inset -2px -2px 0 rgba(0,0,0,0.3);
  }
  .brick::after {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 2px;
    background: #4E342E;
  }
  .brick::before {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 2px;
    background: #4E342E;
  }
  .br1 { top: 12vh; left: calc(3% + 4.5vw); }
  .br2 { top: 14vh; right: calc(4% + 4.5vw); }

  /* Stars - twinkling */
  .star {
    position: absolute;
    z-index: 5;
    animation: twinkle 2s ease-in-out infinite;
  }
  .star svg { filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.3)); }
  .star1 { top: 3vh; left: 8%; animation-delay: 0s; }
  .star2 { top: 4vh; right: 8%; animation-delay: 0.7s; }
  .star3 { top: 18vh; left: 42%; animation-delay: 1.4s; }
  .star4 { top: 45vh; right: 10%; animation-delay: 0.3s; }

  /* Coins - spinning */
  .coin {
    position: absolute;
    width: clamp(20px, 3vw, 30px);
    height: clamp(22px, 3.3vw, 33px);
    background: radial-gradient(ellipse, #FFF176, #FFD600, #FF8F00);
    border-radius: 50%;
    border: 2px solid #E65100;
    z-index: 5;
    box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    animation: spinCoin 1.5s linear infinite;
  }
  .coin::after {
    content: '\2605';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(10px, 1.5vw, 15px);
    color: #E65100;
  }
  .c1 { top: 20vh; left: 18%; animation-delay: 0s; }
  .c2 { top: 22vh; left: 22%; animation-delay: 0.3s; }
  .c3 { top: 20vh; left: 26%; animation-delay: 0.6s; }
  .c4 { top: 20vh; right: 18%; animation-delay: 0.15s; }
  .c5 { top: 22vh; right: 22%; animation-delay: 0.45s; }
  .c6 { top: 20vh; right: 26%; animation-delay: 0.75s; }

  /* Rainbow - scrolling */
  .rainbow {
    position: absolute;
    top: 19vh;
    left: 0; right: 0;
    height: 8px;
    z-index: 2;
    background: repeating-linear-gradient(90deg,
      #F44336 0px, #F44336 20px,
      #FF9800 20px, #FF9800 40px,
      #FFEB3B 40px, #FFEB3B 60px,
      #4CAF50 60px, #4CAF50 80px,
      #2196F3 80px, #2196F3 100px,
      #9C27B0 100px, #9C27B0 120px
    );
    background-size: 120px 8px;
    animation: rainbowScroll 3s linear infinite;
    opacity: 0.7;
  }

  /* Confetti */
  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 12px;
    border-radius: 2px;
    z-index: 3;
    animation: confetti linear infinite;
    opacity: 0.8;
  }

  /* TITLE */
  .title-section {
    position: relative;
    z-index: 10;
    text-align: center;
    padding-top: 2vh;
    flex-shrink: 0;
    animation: slideUp 0.8s ease-out;
  }
  .subtitle-top {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 2.5vw, 24px);
    color: #FFF;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .main-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(40px, 10vw, 90px);
    color: #FFD600;
    text-shadow:
      3px 3px 0 #E65100,
      6px 6px 0 rgba(0,0,0,0.3),
      0 0 20px rgba(255,214,0,0.5);
    letter-spacing: 5px;
    line-height: 1;
    -webkit-text-stroke: 2px #E65100;
  }
  .age-badge {
    display: inline-block;
    background: linear-gradient(135deg, #F44336, #D32F2F);
    color: white;
    font-family: 'Bangers', cursive;
    font-size: clamp(36px, 7vw, 60px);
    width: clamp(70px, 12vw, 110px);
    height: clamp(70px, 12vw, 110px);
    border-radius: 50%;
    line-height: clamp(70px, 12vw, 110px);
    text-align: center;
    border: 5px solid #FFEB3B;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4), inset 0 -2px 6px rgba(0,0,0,0.2);
    margin: 0.5vh auto;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    animation: badgePulse 2s ease-in-out infinite, popIn 0.6s ease-out 0.3s both;
  }
  .age-text {
    font-family: 'Bangers', cursive;
    font-size: clamp(18px, 3.5vw, 28px);
    color: #FFF;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    letter-spacing: 3px;
  }

  /* PHOTOS */
  .photos-section {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: clamp(10px, 2vw, 25px);
    padding: 1vh 5vw;
    flex-shrink: 0;
    animation: slideUp 0.8s ease-out 0.2s both;
  }
  .photo-frame {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    border: 5px solid #FFEB3B;
    box-shadow:
      0 6px 20px rgba(0,0,0,0.4),
      0 0 0 3px #E65100;
    transform: rotate(-1.5deg);
    width: 44%;
    max-width: 320px;
    aspect-ratio: 4/3;
  }
  .photo-frame:nth-child(2) {
    transform: rotate(1.5deg);
  }
  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
    display: block;
  }

  /* INVITATION */
  .invitation-section {
    position: relative;
    z-index: 12;
    text-align: center;
    padding: 1.5vh 5vw;
    flex-shrink: 0;
    animation: slideUp 0.8s ease-out 0.4s both;
  }
  .invitation-box {
    display: inline-block;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 15px;
    padding: 1.5vh 4vw;
    border: 4px solid #FFEB3B;
    box-shadow: 0 4px 18px rgba(0,0,0,0.3), 0 0 0 2px #E65100;
  }
  .invitation-text {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 2.8vw, 24px);
    color: #D32F2F;
    line-height: 1.3;
  }
  .invitation-detail {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: clamp(13px, 2.5vw, 22px);
    color: #1565C0;
    margin-top: 0.5vh;
  }

  /* Characters - animated */
  .character {
    position: absolute;
    z-index: 15;
    filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.4));
  }
  .character img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .mario-character {
    width: clamp(90px, 16vw, 160px);
    height: clamp(100px, 18vw, 180px);
    bottom: 7vh;
    left: 4%;
    animation: marioJump 2s ease-in-out infinite;
  }
  .koopa-character {
    width: clamp(65px, 11vw, 110px);
    height: clamp(85px, 14vw, 140px);
    bottom: 7vh;
    right: 5%;
    animation: koopaWalk 1.2s ease-in-out infinite;
  }
  .mushroom-left {
    width: clamp(40px, 7vw, 65px);
    height: clamp(40px, 7vw, 65px);
    bottom: 22vh;
    left: 20%;
    animation: mushroomBob 2.5s ease-in-out infinite;
  }
  .mushroom-right {
    width: clamp(35px, 6vw, 55px);
    height: clamp(35px, 6vw, 55px);
    top: 38vh;
    right: 6%;
    animation: mushroomBob 2.5s ease-in-out infinite 0.8s;
  }

  /* Bottom text */
  .bottom-text {
    position: absolute;
    bottom: 8vh;
    left: 0; right: 0;
    text-align: center;
    z-index: 12;
  }
  .party-text {
    font-family: 'Bangers', cursive;
    font-size: clamp(22px, 4.5vw, 38px);
    color: #FFF;
    text-shadow: 3px 3px 0 #E65100, 5px 5px 0 rgba(0,0,0,0.2);
    letter-spacing: 3px;
    animation: bounce 1.5s ease-in-out infinite;
  }

  /* Ground & Pipes */
  .ground-section {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    z-index: 8;
  }
  .ground {
    height: 5vh;
    background: linear-gradient(180deg, #4CAF50, #2E7D32);
    border-top: 5px solid #1B5E20;
  }
  .ground::before {
    content: '';
    position: absolute;
    top: -10px;
    left: 0; right: 0;
    height: 12px;
    background: repeating-linear-gradient(
      90deg,
      transparent, transparent 30px,
      #388E3C 30px, #388E3C 32px
    );
  }
  .pipe {
    position: absolute;
    bottom: 5vh;
    z-index: 9;
  }
  .pipe-body {
    width: clamp(40px, 6vw, 60px);
    height: 8vh;
    background: linear-gradient(90deg, #2E7D32, #4CAF50, #66BB6A, #4CAF50, #2E7D32);
    border: 2px solid #1B5E20;
    margin: 0 auto;
  }
  .pipe-top {
    width: clamp(50px, 7.5vw, 75px);
    height: 2.5vh;
    background: linear-gradient(90deg, #2E7D32, #4CAF50, #66BB6A, #4CAF50, #2E7D32);
    border: 2px solid #1B5E20;
    border-radius: 3px 3px 0 0;
    margin: 0 auto;
  }
  .pipe-left { left: 2%; }
  .pipe-right { right: 2%; }

  @media print {
    body { width: 297mm; height: 420mm; overflow: visible; }
    .poster { height: 420mm; }
    *, .cloud, .star, .coin, .question-block, .character, .party-text, .age-badge, .confetti-piece {
      animation: none !important;
    }
  }
</style>
</head>

<script>
(function() {
  let ctx = null;
  let started = false;

  // SMB1 Overworld — from robsoncouto/arduino-songs exact transcription
  // Format: [MIDI note, duration divisor] — 0=rest
  // Divisor: 8=eighth, 4=quarter, -4=dotted quarter, -8=dotted eighth, 2=half, 1=whole
  const BPM = 200;
  const WHOLE = (60 * 4) / BPM; // whole note in seconds

  function dur(d) { return d > 0 ? WHOLE / d : (WHOLE / Math.abs(d)) * 1.5; }
  const freq = (m) => m === 0 ? 0 : 440 * Math.pow(2, (m - 69) / 12);

  // MIDI: C4=60 D4=62 E4=64 F4=65 G4=67 G#4=68 A4=69 Bb4=70 B4=71
  //       C5=72 D5=74 Eb5=75 E5=76 F5=77 F#5=78 G5=79 A5=81 C6=84

  // Exact melody from Arduino transcription
  const melodyData = [
    // Section A — intro + main theme
    76,8, 76,8, 0,8, 76,8, 0,8, 72,8, 76,8,
    79,4, 0,4, 67,8, 0,4,
    // C5(dotted quarter) G4(eighth) rest(quarter) E4(dotted quarter)
    72,-4, 67,8, 0,4, 64,-4,
    // A4 B4 Bb4 A4
    69,4, 71,4, 70,8, 69,4,
    // G4(dotted eighth) E5(dotted eighth) G5(dotted eighth) A5 F5 G5
    67,-8, 76,-8, 79,-8, 81,4, 77,8, 79,8,
    // rest E5 C5 D5 B4(dotted quarter)
    0,8, 76,4, 72,8, 74,8, 71,-4,

    // Repeat of A
    72,-4, 67,8, 0,4, 64,-4,
    69,4, 71,4, 70,8, 69,4,
    67,-8, 76,-8, 79,-8, 81,4, 77,8, 79,8,
    0,8, 76,4, 72,8, 74,8, 71,-4,

    // Section B — bridge
    0,4, 79,8, 78,8, 77,8, 75,4, 76,8,
    0,8, 68,8, 69,8, 72,8, 0,8, 69,8, 72,8, 74,8,
    0,4, 79,8, 78,8, 77,8, 75,4, 76,8,
    0,8, 84,4, 84,8, 84,4, 0,4,
    0,4, 79,8, 78,8, 77,8, 75,4, 76,8,
    0,8, 68,8, 69,8, 72,8, 0,8, 69,8, 72,8, 74,8,
    0,4, 75,4, 0,8, 74,-4, 72,2, 0,2,

    // Section C — variation
    72,8, 72,4, 72,8, 0,8, 72,8, 74,4,
    76,8, 72,4, 69,8, 67,2,
    72,8, 72,4, 72,8, 0,8, 72,8, 74,8, 76,8,
    0,1,
    72,8, 72,4, 72,8, 0,8, 72,8, 74,4,
    76,8, 72,4, 69,8, 67,2,
    // Back to intro motif
    76,8, 76,8, 0,8, 76,8, 0,8, 72,8, 76,8,
    79,4, 0,4, 67,4, 0,4,
  ];

  // Parse flat array into [note, durationSec] pairs
  const melody = [];
  for (let i = 0; i < melodyData.length; i += 2) {
    melody.push([melodyData[i], dur(melodyData[i+1])]);
  }

  // Kick + snare + hi-hat
  const Q = WHOLE / 4, E = WHOLE / 8;

  function playDrums(startTime, duration) {
    if (!ctx) return;
    let t = startTime;
    while (t < startTime + duration) {
      playKick(t);
      playKick(t + Q*2);
      playSnare(t + Q);
      playSnare(t + Q*3);
      for (let i = 0; i < 8; i++) {
        playHiHat(t + E*i, i%2===0 ? 0.022 : 0.012);
      }
      t += Q*4;
    }
  }

  function playKick(t) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(40, t+0.1);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.2);
  }

  function playSnare(t) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'triangle'; osc.frequency.value = 200;
    g.gain.setValueAtTime(0.06, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.08);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.1);
    const bufSize = ctx.sampleRate * 0.05;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = Math.random()*2-1;
    const ns = ctx.createBufferSource();
    const ng = ctx.createGain();
    ns.buffer = buf;
    ng.gain.setValueAtTime(0.05, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t+0.06);
    ns.connect(ng); ng.connect(ctx.destination);
    ns.start(t); ns.stop(t+0.07);
  }

  function playHiHat(t, vol) {
    const bufSize = ctx.sampleRate * 0.025;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = Math.random()*2-1;
    const ns = ctx.createBufferSource();
    const g = ctx.createGain();
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 8000; bp.Q.value = 1;
    ns.buffer = buf;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.025);
    ns.connect(bp); bp.connect(g); g.connect(ctx.destination);
    ns.start(t); ns.stop(t+0.03);
  }

  // Lead synth: filtered sawtooth + sine body
  function playLead(f, start, d, vol) {
    if (f <= 0 || !ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const flt = ctx.createBiquadFilter();
    osc.type = 'sawtooth'; osc.frequency.value = f;
    flt.type = 'lowpass';
    flt.frequency.setValueAtTime(f*4, start);
    flt.frequency.exponentialRampToValueAtTime(f*1.5, start+d*0.8);
    flt.Q.value = 2;
    g.gain.setValueAtTime(vol, start);
    g.gain.setValueAtTime(vol*0.7, start+d*0.5);
    g.gain.exponentialRampToValueAtTime(0.001, start+d*0.9);
    osc.connect(flt); flt.connect(g); g.connect(ctx.destination);
    osc.start(start); osc.stop(start+d+0.02);
    const sub = ctx.createOscillator();
    const sg = ctx.createGain();
    sub.type = 'sine'; sub.frequency.value = f;
    sg.gain.setValueAtTime(vol*0.5, start);
    sg.gain.exponentialRampToValueAtTime(0.001, start+d*0.85);
    sub.connect(sg); sg.connect(ctx.destination);
    sub.start(start); sub.stop(start+d+0.02);
  }

  // Bass synth: filtered square
  function playBassNote(f, start, d, vol) {
    if (f <= 0 || !ctx) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const flt = ctx.createBiquadFilter();
    osc.type = 'square'; osc.frequency.value = f;
    flt.type = 'lowpass'; flt.frequency.value = f*3; flt.Q.value = 3;
    g.gain.setValueAtTime(vol, start);
    g.gain.setValueAtTime(vol*0.6, start+d*0.4);
    g.gain.exponentialRampToValueAtTime(0.001, start+d*0.85);
    osc.connect(flt); flt.connect(g); g.connect(ctx.destination);
    osc.start(start); osc.stop(start+d+0.02);
  }

  function playAll() {
    if (!ctx || !started) return;
    let t = ctx.currentTime + 0.1;
    let totalDur = 0;

    // Play melody + auto bass (melody transposed -24 semitones)
    melody.forEach(([note, d]) => {
      const f = freq(note);
      playLead(f, t, d, 0.055);
      // Bass: play melody notes 2 octaves lower
      if (note > 0) {
        playBassNote(freq(note - 24), t, d, 0.06);
      }
      totalDur += d;
      t += d;
    });

    playDrums(ctx.currentTime + 0.1, totalDur);
    setTimeout(() => { if (started) playAll(); }, totalDur * 1000 + 50);
  }

  function startMusic() {
    if (started) return;
    started = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    playAll();
    document.removeEventListener('click', startMusic);
    document.removeEventListener('touchstart', startMusic);
  }

  document.addEventListener('click', startMusic);
  document.addEventListener('touchstart', startMusic);
})();
</script>
</div>
</body>
</html>
