<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Super Nathan Run !</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#5c94fc;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;height:100vh}
  canvas{display:block;max-width:100vw;max-height:100vh}
  #score{position:fixed;top:12px;right:16px;font:22px Bangers,cursive;color:#FFD600;text-shadow:2px 2px 0 #E65100;letter-spacing:2px}
  a#back{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font:12px sans-serif;color:rgba(255,255,255,.5);text-decoration:none}
</style>
</head>
<body>
<div id="score">00000</div>
<canvas id="g"></canvas>
<a id="back" href="index.html">Retour</a>
<script>
const cv=document.getElementById('g'),c=cv.getContext('2d');
const GW=360,GH=560,GROUND_Y=420;
let scale=1;
function fit(){scale=Math.min(innerWidth/GW,innerHeight/GH);cv.width=GW*scale;cv.height=GH*scale;c.setTransform(scale,0,0,scale,0,0);}
fit();addEventListener('resize',fit);

const nImg=new Image();nImg.src='images/IMG_0804.JPG';

let state='idle',score=0,best=0,speed=4,frame=0,groundX=0;

// ======= AUDIO =======
let ctx=null, musicStarted=false;

function initAudio(){
  if(ctx)return;
  try{ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  // iOS unlock
  const osc=ctx.createOscillator(),g=ctx.createGain();
  g.gain.value=0;osc.connect(g);g.connect(ctx.destination);
  osc.start(0);osc.stop(ctx.currentTime+0.001);
  ctx.resume();
}

// --- Jump sound: bip-biiiip ascending ---
function playJumpSound(){
  if(!ctx)return;
  const t=ctx.currentTime;
  // First short beep
  const o1=ctx.createOscillator(),g1=ctx.createGain();
  o1.type='square';o1.frequency.setValueAtTime(500,t);o1.frequency.linearRampToValueAtTime(800,t+0.07);
  g1.gain.setValueAtTime(0.12,t);g1.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  o1.connect(g1);g1.connect(ctx.destination);o1.start(t);o1.stop(t+0.08);
  // Second longer rising beep
  const o2=ctx.createOscillator(),g2=ctx.createGain();
  o2.type='square';o2.frequency.setValueAtTime(700,t+0.06);o2.frequency.linearRampToValueAtTime(1200,t+0.2);
  g2.gain.setValueAtTime(0.12,t+0.06);g2.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o2.connect(g2);g2.connect(ctx.destination);o2.start(t+0.06);o2.stop(t+0.22);
}

// --- Mario death sound ---
function playDeathSound(){
  if(!ctx)return;
  stopMusic();
  const t=ctx.currentTime;
  const notes=[71,69,62,65,67,62,64,60]; // B4 A4 D4 F4 G4 D4 E4 C4
  const durs=[0.12,0.12,0.12,0.12,0.12,0.12,0.12,0.4];
  let time=t+0.1;
  notes.forEach((n,i)=>{
    const f=440*Math.pow(2,(n-69)/12);
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='square';o.frequency.value=f;
    g.gain.setValueAtTime(0.13,time);
    g.gain.exponentialRampToValueAtTime(0.001,time+durs[i]*0.9);
    o.connect(g);g.connect(ctx.destination);
    o.start(time);o.stop(time+durs[i]);
    time+=durs[i];
  });
}

// --- Background music (SMB1 Overworld from index.html) ---
const BPM=200, WHOLE=(60*4)/BPM;
function dur(d){return d>0?WHOLE/d:(WHOLE/Math.abs(d))*1.5;}
const freq=(m)=>m===0?0:440*Math.pow(2,(m-69)/12);

const melodyData=[
  76,8,76,8,0,8,76,8,0,8,72,8,76,8,
  79,4,0,4,67,8,0,4,
  72,-4,67,8,0,4,64,-4,
  69,4,71,4,70,8,69,4,
  67,-8,76,-8,79,-8,81,4,77,8,79,8,
  0,8,76,4,72,8,74,8,71,-4,
  72,-4,67,8,0,4,64,-4,
  69,4,71,4,70,8,69,4,
  67,-8,76,-8,79,-8,81,4,77,8,79,8,
  0,8,76,4,72,8,74,8,71,-4,
  0,4,79,8,78,8,77,8,75,4,76,8,
  0,8,68,8,69,8,72,8,0,8,69,8,72,8,74,8,
  0,4,79,8,78,8,77,8,75,4,76,8,
  0,8,84,4,84,8,84,4,0,4,
  0,4,79,8,78,8,77,8,75,4,76,8,
  0,8,68,8,69,8,72,8,0,8,69,8,72,8,74,8,
  0,4,75,4,0,8,74,-4,72,2,0,2,
  72,8,72,4,72,8,0,8,72,8,74,4,
  76,8,72,4,69,8,67,2,
  72,8,72,4,72,8,0,8,72,8,74,8,76,8,
  0,1,
  72,8,72,4,72,8,0,8,72,8,74,4,
  76,8,72,4,69,8,67,2,
  76,8,76,8,0,8,76,8,0,8,72,8,76,8,
  79,4,0,4,67,4,0,4,
];
const melody=[];
for(let i=0;i<melodyData.length;i+=2)melody.push([melodyData[i],dur(melodyData[i+1])]);

function playLead(f,start,d,vol){
  if(f<=0||!ctx)return;
  const o=ctx.createOscillator(),g=ctx.createGain(),flt=ctx.createBiquadFilter();
  o.type='sawtooth';o.frequency.value=f;
  flt.type='lowpass';flt.frequency.setValueAtTime(f*4,start);flt.frequency.exponentialRampToValueAtTime(f*1.5,start+d*0.8);flt.Q.value=2;
  g.gain.setValueAtTime(vol,start);g.gain.setValueAtTime(vol*0.7,start+d*0.5);g.gain.exponentialRampToValueAtTime(0.001,start+d*0.9);
  o.connect(flt);flt.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+d+0.02);
  const sub=ctx.createOscillator(),sg=ctx.createGain();
  sub.type='sine';sub.frequency.value=f;
  sg.gain.setValueAtTime(vol*0.5,start);sg.gain.exponentialRampToValueAtTime(0.001,start+d*0.85);
  sub.connect(sg);sg.connect(ctx.destination);sub.start(start);sub.stop(start+d+0.02);
}
function playBassNote(f,start,d,vol){
  if(f<=0||!ctx)return;
  const o=ctx.createOscillator(),g=ctx.createGain(),flt=ctx.createBiquadFilter();
  o.type='square';o.frequency.value=f;
  flt.type='lowpass';flt.frequency.value=f*3;flt.Q.value=3;
  g.gain.setValueAtTime(vol,start);g.gain.setValueAtTime(vol*0.6,start+d*0.4);g.gain.exponentialRampToValueAtTime(0.001,start+d*0.85);
  o.connect(flt);flt.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+d+0.02);
}
function playKick(t){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+0.1);
  g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.2);
}
function playSnare(t){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='triangle';o.frequency.value=200;
  g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.1);
  const bufSize=ctx.sampleRate*0.05,buf=ctx.createBuffer(1,bufSize,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++)d[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(),ng=ctx.createGain();
  ns.buffer=buf;ng.gain.setValueAtTime(0.05,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  ns.connect(ng);ng.connect(ctx.destination);ns.start(t);ns.stop(t+0.07);
}
function playHiHat(t,vol){
  const bufSize=ctx.sampleRate*0.025,buf=ctx.createBuffer(1,bufSize,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++)d[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(),g=ctx.createGain(),bp=ctx.createBiquadFilter();
  bp.type='bandpass';bp.frequency.value=8000;bp.Q.value=1;
  ns.buffer=buf;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.025);
  ns.connect(bp);bp.connect(g);g.connect(ctx.destination);ns.start(t);ns.stop(t+0.03);
}
function playDrums(startTime,duration){
  if(!ctx)return;
  const Q=WHOLE/4,E=WHOLE/8;
  let t=startTime;
  while(t<startTime+duration){
    playKick(t);playKick(t+Q*2);playSnare(t+Q);playSnare(t+Q*3);
    for(let i=0;i<8;i++)playHiHat(t+E*i,i%2===0?0.022:0.012);
    t+=Q*4;
  }
}

let musicTimer=null;
function playMusic(){
  if(!ctx||!musicStarted)return;
  let t=ctx.currentTime+0.1, totalDur=0;
  melody.forEach(([note,d])=>{
    const f=freq(note);
    playLead(f,t,d,0.055);
    if(note>0)playBassNote(freq(note-24),t,d,0.06);
    totalDur+=d;t+=d;
  });
  playDrums(ctx.currentTime+0.1,totalDur);
  musicTimer=setTimeout(()=>{if(musicStarted)playMusic();},totalDur*1000+50);
}
function startMusic(){
  if(musicStarted)return;
  musicStarted=true;
  playMusic();
}
function stopMusic(){
  musicStarted=false;
  if(musicTimer){clearTimeout(musicTimer);musicTimer=null;}
}
// ======= END AUDIO =======

// Player - plus grand
const P={x:50,y:GROUND_Y,vy:0,w:50,h:60,jumping:false};
const GRAVITY=0.55,JUMP=-11.5;

let obstacles=[],nextSpawn=80;
const clouds=[{x:40,y:70},{x:170,y:40},{x:300,y:90},{x:100,y:120}];

function doJump(){
  if(state==='idle'){initAudio();state='play';score=0;speed=4;obstacles=[];nextSpawn=80;frame=0;startMusic();}
  if(state==='dead')return;
  if(!P.jumping){P.vy=JUMP;P.jumping=true;playJumpSound();}
}
addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();}});
addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});
addEventListener('touchend',()=>{if(state==='dead'){state='idle';P.y=GROUND_Y;P.vy=0;P.jumping=false;stopMusic();}});
addEventListener('keydown',e=>{if(state==='dead'&&(e.code==='Space'||e.code==='ArrowUp')){state='idle';P.y=GROUND_Y;P.vy=0;P.jumping=false;stopMusic();}});

function spawnObstacle(){
  const r=Math.random();
  if(r<0.35) obstacles.push({x:GW+10,y:GROUND_Y,w:20,h:36,type:'pipe_s'});
  else if(r<0.55) obstacles.push({x:GW+10,y:GROUND_Y,w:26,h:52,type:'pipe_l'});
  else if(r<0.75) obstacles.push({x:GW+10,y:GROUND_Y,w:22,h:24,type:'goomba'});
  else if(r<0.9){obstacles.push({x:GW+10,y:GROUND_Y,w:20,h:36,type:'pipe_s'});obstacles.push({x:GW+50,y:GROUND_Y,w:22,h:24,type:'goomba'});}
  else obstacles.push({x:GW+10,y:GROUND_Y,w:26,h:52,type:'pipe_l'});
  nextSpawn=50+Math.random()*55;
}

function update(){
  if(state!=='play')return;
  frame++;score=Math.floor(frame/5);
  speed=4+score/250;

  P.vy+=GRAVITY;P.y+=P.vy;
  if(P.y>=GROUND_Y){P.y=GROUND_Y;P.vy=0;P.jumping=false;}

  groundX-=speed;if(groundX<=-GW)groundX+=GW;
  clouds.forEach(cl=>{cl.x-=speed*0.3;if(cl.x<-60)cl.x=GW+40;});

  nextSpawn--;if(nextSpawn<=0)spawnObstacle();
  obstacles.forEach(o=>{o.x-=speed;if(o.squishT!==undefined&&o.squishT>0)o.squishT--;});
  obstacles=obstacles.filter(o=>o.x>-50);

  // collision
  const px=P.x+6,py=P.y-P.h,pw=P.w-12,ph=P.h;
  obstacles.forEach(o=>{
    if(o.dead)return;
    const ox=o.x+3,oy=o.y-o.h,ow=o.w-6,oh=o.h;
    if(px+pw>ox&&px<ox+ow&&py+ph>oy&&py<oy+oh){
      // par dessus: rebond
      if(P.vy>0&&P.y<o.y-o.h+10){
        if(o.type==='goomba'){o.dead=true;o.squishT=20;} // goombas ecrasés
        P.vy=JUMP*0.8;P.jumping=true;score+=10;
      } else {
        state='dead';if(score>best)best=score;playDeathSound();
      }
    }
  });
  obstacles=obstacles.filter(o=>!(o.dead&&o.squishT!==undefined&&o.squishT<=0));
}

function draw(){
  // sky
  const sky=c.createLinearGradient(0,0,0,GH);
  sky.addColorStop(0,'#5c94fc');sky.addColorStop(1,'#1565C0');
  c.fillStyle=sky;c.fillRect(0,0,GW,GH);

  // clouds
  c.fillStyle='rgba(255,255,255,0.85)';
  clouds.forEach(cl=>{
    c.beginPath();c.arc(cl.x,cl.y,20,0,Math.PI*2);c.arc(cl.x+18,cl.y-7,15,0,Math.PI*2);c.arc(cl.x-14,cl.y+2,13,0,Math.PI*2);c.fill();
  });

  // ground
  c.fillStyle='#8B4513';c.fillRect(0,GROUND_Y+1,GW,GH-GROUND_Y);
  c.fillStyle='#228B22';c.fillRect(0,GROUND_Y-4,GW,8);
  c.fillStyle='#2E7D32';
  for(let i=0;i<25;i++){const gx=((groundX+i*20)%GW+GW)%GW;c.fillRect(gx,GROUND_Y-6,8,3);}

  // bricks pattern in ground
  c.fillStyle='#A0522D';
  for(let i=0;i<25;i++){const gx=((groundX*0.5+i*24)%GW+GW)%GW;c.fillRect(gx,GROUND_Y+10,20,10);c.strokeStyle='#6B3410';c.lineWidth=0.5;c.strokeRect(gx,GROUND_Y+10,20,10);}

  // obstacles
  obstacles.forEach(o=>{
    if(o.type==='pipe_s'||o.type==='pipe_l'){
      const pw=o.w,ph=o.h;
      c.fillStyle='#2E7D32';c.fillRect(o.x,o.y-ph,pw,ph);
      c.fillStyle='#4CAF50';c.fillRect(o.x+3,o.y-ph+8,pw-6,ph-8);
      c.fillStyle='#66BB6A';c.fillRect(o.x+pw/2-2,o.y-ph+8,4,ph-8);
      c.fillStyle='#2E7D32';c.fillRect(o.x-4,o.y-ph,pw+8,10);
      c.fillStyle='#4CAF50';c.fillRect(o.x-2,o.y-ph+2,pw+4,6);
    } else if(o.type==='goomba'){
      const gx=o.x,gy=o.y;
      if(o.dead){
        // ecrase: juste une galette plate
        c.fillStyle='#8B4513';c.fillRect(gx+2,gy-4,o.w-4,4);
      } else {
        c.fillStyle='#8B4513';c.beginPath();c.arc(gx+o.w/2,gy-o.h+10,12,0,Math.PI*2);c.fill();
        c.fillStyle='#A0522D';c.beginPath();c.ellipse(gx+o.w/2,gy-6,o.w/2,8,0,0,Math.PI*2);c.fill();
        c.fillStyle='#fff';c.beginPath();c.arc(gx+7,gy-o.h+8,4,0,Math.PI*2);c.fill();c.beginPath();c.arc(gx+15,gy-o.h+8,4,0,Math.PI*2);c.fill();
        c.fillStyle='#000';c.beginPath();c.arc(gx+8,gy-o.h+9,1.8,0,Math.PI*2);c.fill();c.beginPath();c.arc(gx+14,gy-o.h+9,1.8,0,Math.PI*2);c.fill();
        c.fillStyle='#000';
        const wo=state==='play'?Math.sin(frame/3)*3:0;
        c.fillRect(gx+2-wo,gy-4,8,4);c.fillRect(gx+12+wo,gy-4,8,4);
      }
    }
  });

  // --- PLAYER ---
  const px=P.x,py=P.y;

  // legs
  const legFrame=state==='play'?Math.floor(frame/4)%2:0;
  c.fillStyle='#1565C0';
  if(P.jumping){
    c.fillRect(px+10,py-10,10,10);c.fillRect(px+28,py-10,10,10);
  } else {
    c.fillRect(px+10,py-(legFrame?14:6),10,legFrame?14:6);
    c.fillRect(px+28,py-(legFrame?6:14),10,legFrame?6:14);
  }
  // shoes
  c.fillStyle='#5D4037';
  if(P.jumping){c.fillRect(px+8,py-4,12,4);c.fillRect(px+28,py-4,12,4);}
  else{c.fillRect(px+8,py-3,12,3);c.fillRect(px+28,py-3,12,3);}

  // body
  c.fillStyle='#E53935';c.fillRect(px+6,py-P.h+24,P.w-12,16);
  c.fillStyle='#1565C0';c.fillRect(px+4,py-P.h+36,P.w-8,12);
  // overall buttons
  c.fillStyle='#FFD600';c.beginPath();c.arc(px+12,py-P.h+38,2,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(px+P.w-12,py-P.h+38,2,0,Math.PI*2);c.fill();

  // Nathan head
  const headR=26;
  const hcx=px+P.w/2, hcy=py-P.h+6;
  if(nImg.complete&&nImg.naturalWidth){
    c.save();
    c.beginPath();c.arc(hcx,hcy,headR,0,Math.PI*2);c.clip();
    // Crop juste le visage: la photo est portrait, visage dans le haut
    // On prend un carre centre sur le visage
    const iw=nImg.naturalWidth, ih=nImg.naturalHeight;
    const faceSize=iw*0.75; // largeur du visage environ 75% de la largeur photo
    const sx=(iw-faceSize)/2 + iw*0.08; // un peu a droite
    const sy=ih*0.12; // un peu plus bas pour centrer le visage
    c.imageSmoothingEnabled=true;
    c.imageSmoothingQuality='high';
    c.drawImage(nImg, sx, sy, faceSize, faceSize, hcx-headR, hcy-headR, headR*2, headR*2);
    c.restore();
    // bordure jaune
    c.strokeStyle='#FFEB3B';c.lineWidth=3;c.beginPath();c.arc(hcx,hcy,headR,0,Math.PI*2);c.stroke();
  } else {
    c.fillStyle='#FFCC80';c.beginPath();c.arc(hcx,hcy,headR,0,Math.PI*2);c.fill();
  }
  // casquette Mario rouge
  c.fillStyle='#E53935';
  c.beginPath();c.ellipse(hcx+2,hcy-headR+6,headR+4,12,0,Math.PI,0);c.fill();
  c.fillRect(hcx-2,hcy-headR-3,headR+10,7);
  // "N" blanc
  c.fillStyle='#fff';c.beginPath();c.arc(hcx+6,hcy-headR+2,7,0,Math.PI*2);c.fill();
  c.fillStyle='#E53935';c.font='bold 10px Arial';c.textAlign='center';c.fillText('N',hcx+6,hcy-headR+6);

  // HUD
  document.getElementById('score').textContent=(score+'').padStart(5,'0');

  // Messages
  if(state==='idle'){
    // box
    c.fillStyle='rgba(255,255,255,0.9)';roundRect(80,140,200,130,12);c.fill();
    c.strokeStyle='#FFEB3B';c.lineWidth=3;roundRect(80,140,200,130,12);c.stroke();
    c.fillStyle='#E53935';c.font='26px Bangers';c.textAlign='center';c.fillText('Super Nathan',GW/2,175);c.fillText('Run !',GW/2,205);
    c.fillStyle='#1565C0';c.font='16px Bangers';c.fillText('Appuie pour sauter !',GW/2,240);
    if(best>0){c.fillStyle='#E65100';c.font='14px Bangers';c.fillText('Record: '+best,GW/2,260);}
  }
  if(state==='dead'){
    c.fillStyle='rgba(0,0,0,0.5)';c.fillRect(0,0,GW,GH);
    c.fillStyle='rgba(255,255,255,0.95)';roundRect(70,150,220,140,12);c.fill();
    c.strokeStyle='#E53935';c.lineWidth=3;roundRect(70,150,220,140,12);c.stroke();
    c.fillStyle='#E53935';c.font='30px Bangers';c.textAlign='center';c.fillText('Game Over !',GW/2,190);
    c.fillStyle='#FFD600';c.font='22px Bangers';c.fillText('Score: '+score,GW/2,225);
    if(score>=best&&score>0){c.fillStyle='#4CAF50';c.font='16px Bangers';c.fillText('Nouveau record !',GW/2,252);}
    c.fillStyle='#666';c.font='14px Bangers';c.fillText('Appuie pour rejouer',GW/2,278);
  }
}

function roundRect(x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
